<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>拾光档案 - Rinno Archive</title>
    <script src="../../vendor/dexie.js"></script>
    <style>
        :root {
            --paper-bg: #fcfafb;
            --paper-surface: #ffffff;
            --paper-surface-alt: #f6eef1;
            --ink-main: #2b2729;
            --ink-sub: #8d6e7b;
            --ink-light: #c2aab4;
            --accent: #d9b7c0;
            --accent-strong: #7e5d69;
            --danger: #a65a68;
            --success: #6b7f70;
            --border-color: rgba(141, 110, 123, 0.2);
            --shadow-soft: 0 12px 30px rgba(88, 55, 68, 0.05);
            --shadow-hover: 0 16px 40px rgba(88, 55, 68, 0.08);
            --font-sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            --font-serif: "Petit Formal Script", "Times New Roman", "Songti SC", Georgia, serif;
            --safe-bottom: env(safe-area-inset-bottom, 24px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scrollbar-width: none;
        }

        body {
            min-height: 100vh;
            background-color: var(--paper-bg);
            color: var(--ink-main);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        body::before {
            display: none;
        }

        button,
        input {
            font: inherit;
        }

        .screen {
            display: none;
            width: 100%;
            min-height: 100vh;
            animation: screenFadeIn 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .screen.active {
            display: block;
        }

        @keyframes screenFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .home-header {
            display: none;
        }

        .home-kicker,
        .scope-label,
        .detail-hero-kicker,
        .secure-chip,
        .box-label,
        .summary-id,
        .char-no,
        .memory-tag,
        .plot-meta {
            font-family: var(--font-serif);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .home-kicker {
            display: block;
            margin-bottom: 12px;
            color: var(--ink-sub);
            font-size: 11px;
        }

        .home-title {
            margin-bottom: 12px;
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 500;
            letter-spacing: 4px;
        }

        .home-desc {
            color: var(--ink-sub);
            font-size: 13px;
            line-height: 1.7;
            letter-spacing: 0.5px;
        }

        .scope-shell,
        .search-shell,
        .char-list-meta,
        .char-list {
            margin: 0 24px;
        }

        .scope-shell {
            display: block;
            margin-top: 24px;
            height: 1px;
            background: rgba(141, 110, 123, 0.18);
            border: 0;
            box-shadow: none;
            padding: 0;
        }

        .scope-copy {
            display: none;
        }

        .scope-label {
            color: var(--ink-light);
            font-size: 10px;
        }

        .scope-value {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
            word-break: break-all;
        }

        .scope-note {
            color: var(--ink-sub);
            font-size: 12px;
            line-height: 1.6;
        }

        .scope-action {
            display: none;
        }

        .scope-action:active,
        .search-refresh:active,
        .sg-back-btn:active,
        .sg-tab:active {
            opacity: 0.6;
        }

        .search-shell {
            display: none;
        }

        .search-input {
            width: 100%;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.82);
            padding: 14px 16px;
            color: var(--ink-main);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .search-input::placeholder {
            color: var(--ink-light);
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(141, 110, 123, 0.42);
        }

        .search-refresh {
            border: 1px solid var(--border-color);
            background: var(--paper-surface);
            color: var(--ink-main);
            padding: 0 14px;
            cursor: pointer;
        }

        .char-list-meta {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            color: var(--ink-sub);
            font-size: 12px;
        }

        .char-list {
            margin-top: 18px;
            padding-bottom: calc(64px + var(--safe-bottom));
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .char-card {
            background: var(--paper-surface);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-soft);
            padding: 16px;
            height: 154px;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: grid;
            grid-template-columns: 86px 1fr;
            gap: 18px;
            align-items: stretch;
            text-align: left;
        }

        .char-card:active {
            transform: scale(0.985);
            box-shadow: var(--shadow-hover);
        }

        .char-avatar-box {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: var(--paper-surface-alt);
            height: 100%;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink-light);
            font-family: var(--font-serif);
            font-size: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .char-avatar-box.has-image::after,
        .detail-hero-avatar.has-image::after,
        .summary-avatar.has-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: var(--archive-avatar-image);
            background-size: cover;
            background-position: center;
        }

        .char-avatar-box span,
        .detail-hero-avatar span,
        .summary-avatar span {
            position: relative;
            z-index: 1;
        }

        .char-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
            overflow: hidden;
        }

        .char-no {
            display: none;
        }

        .char-name {
            margin-bottom: 4px;
            font-family: var(--font-serif);
            font-size: 22px;
            font-weight: 500;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .char-role {
            margin-bottom: 8px;
            color: var(--ink-sub);
            font-size: 12px;
            line-height: 1.4;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .char-bio {
            color: var(--ink-sub);
            font-size: 12px;
            line-height: 1.7;
            display: -webkit-box;
            overflow: hidden;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .char-meta-row {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .char-status,
        .char-id-chip,
        .detail-tag,
        .relation-tag {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--border-color);
            background: var(--paper-surface-alt);
            padding: 4px 8px;
            color: var(--ink-main);
            font-size: 10px;
            letter-spacing: 1px;
        }

        .char-status.is-rich {
            border-color: rgba(126, 93, 105, 0.26);
            background: rgba(217, 183, 192, 0.15);
        }

        .char-status.is-empty {
            color: var(--ink-sub);
        }

        .char-id-chip {
            color: var(--ink-sub);
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .empty-state {
            background: var(--paper-surface);
            border: 1px dashed var(--border-color);
            padding: 28px 22px;
            color: var(--ink-sub);
            box-shadow: var(--shadow-soft);
        }

        .empty-state strong {
            display: block;
            margin-bottom: 8px;
            color: var(--ink-main);
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 500;
        }

        .empty-state p {
            font-size: 13px;
            line-height: 1.7;
        }

        .sg-header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(252, 250, 251, 0.94);
            padding: 20px 24px 14px;
        }

        .sg-header::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -18px;
            height: 22px;
            background: linear-gradient(180deg, rgba(252, 250, 251, 0.96) 0%, rgba(252, 250, 251, 0) 100%);
            pointer-events: none;
        }

        .sg-header-top {
            display: none;
        }

        .sg-back-btn {
            display: none;
            border: none;
            background: none;
            color: var(--ink-main);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            padding: 6px 0;
        }

        .sg-back-btn svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
        }

        .sg-title-area {
            flex: 1;
            min-width: 0;
            text-align: left;
        }

        .sg-kicker {
            display: block;
            margin-bottom: 4px;
            color: var(--ink-sub);
            font-size: 10px;
        }

        .sg-title {
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .secure-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.82);
            padding: 6px 10px;
            color: var(--ink-sub);
            font-size: 10px;
            white-space: nowrap;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .secure-chip::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
        }

        .detail-hero {
            display: grid;
            grid-template-columns: 74px 1fr;
            gap: 16px;
            align-items: center;
            padding: 0 0 18px;
            min-height: 74px;
            border-bottom: 1px solid rgba(141, 110, 123, 0.18);
        }

        .detail-hero-avatar,
        .summary-avatar {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: var(--paper-surface-alt);
            color: var(--ink-sub);
        }

        .detail-hero-avatar {
            width: 74px;
            height: 74px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-serif);
            font-size: 24px;
            border-radius: 20px;
            padding: 0;
            cursor: pointer;
        }

        .detail-hero-copy {
            min-width: 0;
            min-height: 74px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .detail-name {
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 500;
            line-height: 1.12;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .detail-hero-tags {
            margin-top: 10px;
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            min-width: 0;
            overflow: hidden;
        }

        .detail-tag {
            display: inline-flex;
            align-items: center;
            min-width: 0;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--ink-sub);
            border: 0;
            background: transparent;
            padding: 0;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .sg-tabs {
            display: flex;
            gap: 24px;
        }

        .sg-tab {
            position: relative;
            border: none;
            background: none;
            padding: 12px 2px;
            color: var(--ink-light);
            font-size: 14px;
            cursor: pointer;
            transition: color 0.25s ease;
            letter-spacing: 1px;
        }

        .sg-tab.active {
            color: var(--ink-main);
            font-weight: 600;
        }

        .sg-tab.active::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -1px;
            height: 1.5px;
            background: var(--ink-main);
        }

        .sg-view {
            display: none;
            padding: 20px 24px calc(64px + var(--safe-bottom));
            animation: viewFadeIn 0.35s ease forwards;
        }

        .sg-view.active {
            display: block;
        }

        @keyframes viewFadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .memory-list,
        .plot-timeline {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .memory-card,
        .summary-box {
            background: var(--paper-surface);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-soft);
        }

        .memory-card {
            padding: 16px;
        }

        .memory-meta {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
        }

        .memory-date {
            min-width: 66px;
            font-family: var(--font-serif);
            font-size: 32px;
            line-height: 0.9;
            color: var(--ink-main);
            font-weight: 400;
        }

        .memory-date span {
            display: block;
            margin-top: 5px;
            color: var(--ink-sub);
            font-size: 10px;
        }

        .memory-date.is-stage {
            font-size: 16px;
            line-height: 1.3;
            letter-spacing: 1px;
        }

        .memory-text {
            flex: 1;
            min-width: 0;
            font-size: 13px;
            line-height: 1.85;
            color: var(--ink-main);
            word-break: break-word;
        }

        .memory-subtext {
            margin-top: 10px;
            color: var(--ink-sub);
            font-size: 12px;
            line-height: 1.7;
            border-top: 1px dashed rgba(141, 110, 123, 0.24);
            padding-top: 10px;
        }

        .memory-tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .memory-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            background: var(--paper-surface-alt);
            color: var(--ink-sub);
            font-size: 10px;
        }

        .plot-chapter {
            position: relative;
            padding-left: 24px;
            margin-left: 12px;
        }

        .plot-chapter::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 8px;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--ink-main);
            box-shadow: 0 0 0 4px var(--paper-bg);
        }

        .plot-timeline::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 8px;
            bottom: 8px;
            width: 1px;
            background: var(--border-color);
        }

        .plot-timeline {
            position: relative;
            padding-left: 0;
        }

        .chapter-num {
            display: block;
            margin-bottom: 8px;
            color: var(--ink-light);
            font-family: var(--font-serif);
            font-size: 10px;
            letter-spacing: 2px;
        }

        .chapter-title {
            margin-bottom: 14px;
            font-size: 18px;
            font-weight: 500;
            color: var(--ink-main);
        }

        .chapter-quote {
            margin-bottom: 14px;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-left: 2px solid var(--accent);
            background: rgba(246, 238, 241, 0.78);
            color: var(--ink-sub);
            font-family: var(--font-serif);
            font-size: 13px;
            line-height: 1.7;
            font-style: italic;
        }

        .chapter-body {
            font-size: 13px;
            line-height: 1.85;
            color: var(--ink-main);
        }

        .plot-meta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            color: var(--ink-light);
            font-size: 10px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .summary-header {
            display: none;
        }

        .summary-box {
            padding: 16px;
        }

        .summary-box.full {
            grid-column: 1 / -1;
        }

        .box-label {
            display: block;
            margin-bottom: 12px;
            color: var(--ink-light);
            font-size: 10px;
        }

        .box-value {
            color: var(--ink-main);
            font-size: 15px;
            line-height: 1.65;
        }

        .summary-note {
            margin-top: 10px;
            color: var(--ink-sub);
            font-size: 12px;
            line-height: 1.7;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-name {
            width: 78px;
            flex-shrink: 0;
            color: var(--ink-sub);
            font-size: 12px;
        }

        .stat-bar-bg {
            position: relative;
            flex: 1;
            height: 2px;
            background: var(--paper-surface-alt);
        }

        .stat-bar-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--ink-main);
        }

        .stat-value {
            width: 42px;
            flex-shrink: 0;
            color: var(--ink-sub);
            font-size: 11px;
            text-align: right;
        }

        .relation-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .relation-tag {
            font-size: 11px;
        }

        .relation-tag.solid {
            background: var(--ink-main);
            border-color: var(--ink-main);
            color: var(--paper-surface);
        }

        .id-grid,
        .summary-facts {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .id-line,
        .fact-line {
            display: grid;
            grid-template-columns: 92px 1fr;
            gap: 10px;
            align-items: start;
        }

        .id-line span,
        .fact-line span {
            color: var(--ink-sub);
            font-size: 12px;
        }

        .id-line strong,
        .fact-line strong {
            color: var(--ink-main);
            font-size: 12px;
            line-height: 1.6;
            word-break: break-all;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: calc(22px + var(--safe-bottom));
            transform: translateX(-50%);
            z-index: 40;
            max-width: calc(100vw - 40px);
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.94);
            box-shadow: var(--shadow-soft);
            color: var(--ink-main);
            font-size: 12px;
            line-height: 1.6;
        }

        .toast[hidden] {
            display: none;
        }

        @media (max-width: 380px) {
            .scope-shell,
            .search-shell {
                grid-template-columns: 1fr;
            }

            .detail-hero {
                grid-template-columns: 1fr;
            }

            .detail-hero-avatar {
                width: 68px;
                height: 68px;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }
        }

        .home-header {
            display: block;
            padding: 24px 24px 18px;
            text-align: center;
        }

        .home-header::after {
            content: '';
            display: block;
            width: 100%;
            height: 1px;
            margin-top: 18px;
            background: linear-gradient(90deg, transparent, rgba(126, 93, 105, 0.24), transparent);
        }

        .scope-shell,
        .search-shell {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 16px;
            align-items: center;
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(246, 238, 241, 0.82)),
                linear-gradient(180deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0));
            border: 1px solid rgba(141, 110, 123, 0.18);
            box-shadow: none;
            min-height: auto;
            padding: 20px 18px;
        }

        .scope-shell {
            margin-top: 8px;
            height: auto;
        }

        .scope-shell::before,
        .search-shell::before,
        .char-card::before {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(141, 110, 123, 0.12);
            pointer-events: none;
        }

        .scope-shell::after,
        .search-shell::after,
        .char-card::after,
        .detail-hero::after,
        .sg-tabs::after {
            content: '';
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 12px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(126, 93, 105, 0.22), transparent);
            pointer-events: none;
        }

        .scope-copy,
        .search-input,
        .scope-action,
        .search-refresh {
            position: relative;
            z-index: 1;
        }

        .scope-copy {
            display: block;
        }

        .scope-label {
            margin-bottom: 8px;
        }

        .scope-value {
            display: block;
        }

        .scope-note {
            margin-top: 8px;
        }

        .scope-action,
        .search-refresh {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 18px;
            border: 1px solid rgba(126, 93, 105, 0.2);
            background: rgba(255, 255, 255, 0.72);

            color: var(--ink-sub);
        }

        .stat-bar-bg {
            height: 2px;
            background: color-mix(in srgb, var(--accent-strong) 10%, var(--paper-surface-alt));
        }

        .stat-bar-fill {
            background: color-mix(in srgb, var(--accent-strong) 90%, var(--ink-main));
        }

        .relation-tags {
            gap: 10px;
        }

        .relation-tag.solid {
            background: color-mix(in srgb, var(--accent-strong) 12%, var(--paper-surface));
            border-color: color-mix(in srgb, var(--accent-strong) 20%, transparent);
            color: color-mix(in srgb, var(--accent-strong) 92%, var(--ink-main));
        }

        .summary-avatar {
            width: 80px;
            height: 80px;
            margin: 0 auto 14px;
            border-radius: 50%;
            border: 1px solid color-mix(in srgb, var(--accent-strong) 16%, transparent);
            box-shadow: 0 10px 24px color-mix(in srgb, var(--accent-strong) 10%, transparent);

        .screen[data-detail-view="view-summary"] .sg-tabs {

                grid-template-columns: 68px minmax(0, 1fr);
                gap: 14px;

                height: 68px;

            .detail-name,
            .summary-name {

            }

                gap: 6px 12px;

            .char-card {
                padding: 14px 14px 12px;
                grid-template-columns: 72px minmax(0, 1fr);

        .toast {
            border: 1px solid color-mix(in srgb, var(--accent-strong) 16%, transparent);
            background: var(--paper-surface);
            box-shadow: var(--shadow-soft);

            }

            .scope-switch-panel {

            }
        }
    </style>
</head>
<body>
    <div id="screen-home" class="screen active">
        <header class="home-header">
            <div class="home-bar">
                <button class="home-title" id="home-title" type="button" aria-label="返回主屏">拾光档案</button>
                <button class="scope-switch-trigger" id="scope-switch-trigger" type="button" aria-label="切换 user 账号" aria-haspopup="dialog" aria-expanded="false">
                    <span class="scope-switch-label">USER</span>
                    <strong class="scope-switch-value" id="scope-switch-current">载入中…</strong>
                </button>
            </div>
            <p class="home-desc" id="home-desc">仅读取当前 user 作用域内的联系人记忆切片与关系档案。</p>
        </header>

        <div class="scope-switch-panel" id="scope-switch-panel" hidden></div>

        <section class="scope-shell" aria-label="当前档案作用域">
            <div class="scope-copy">
                <span class="scope-label">Current Scope</span>
                <strong class="scope-value" id="scope-owner-line">载入中…</strong>
                <p class="scope-note" id="scope-owner-note">拾光会强制按当前私叙账号隔离联系人、线程与关系资料。</p>
            </div>
            <button class="scope-action" id="refresh-archive" type="button">刷新档案</button>
        </section>

        <section class="search-shell" aria-label="联系人检索">
            <input class="search-input" id="archive-search-input" type="search" placeholder="检索姓名 / 昵称 / 账号 ID" autocomplete="off">
            <button class="search-refresh" id="clear-search" type="button" aria-label="清空检索">清空</button>
        </section>

        <div class="char-list-meta">
            <span id="char-list-count">0 个联系人</span>
            <span id="char-list-note">ID Guard Enabled</span>
        </div>

        <div class="char-list" id="char-list" aria-live="polite"></div>
    </div>

    <div id="screen-detail" class="screen" data-detail-view="view-memory">
        <header class="sg-header">
            <div class="sg-header-top">
                <button class="sg-title" id="detail-title" type="button" aria-label="返回联系人列表">拾光档案</button>
            </div>

            <div class="detail-hero">
                <button class="detail-hero-avatar" id="detail-hero-avatar" type="button" aria-label="返回档案列表"><span></span></button>
                <div class="detail-hero-copy">
                    <h1 class="detail-name" id="detail-name">—</h1>
                    <div class="detail-hero-tags" id="detail-hero-tags"></div>
                    <div class="detail-hero-id" id="detail-hero-id">ID —</div>
                </div>
            </div>

            <nav class="sg-tabs" aria-label="档案视图切换">
                <button class="sg-tab active" type="button" data-target="view-memory">记忆</button>
                <button class="sg-tab" type="button" data-target="view-plot">剧情</button>
                <button class="sg-tab" type="button" data-target="view-summary">总结</button>
            </nav>
        </header>

        <main class="sg-view active" id="view-memory">
            <div class="memory-list" id="memory-list"></div>
        </main>

        <main class="sg-view" id="view-plot">
            <div class="plot-timeline" id="plot-timeline"></div>
        </main>

        <main class="sg-view" id="view-summary">
            <header class="summary-header">
                <div class="summary-avatar" id="summary-avatar"><span></span></div>
                <h2 class="summary-name" id="summary-name-text">—</h2>
                <div class="summary-id">ID: <span id="summary-id-text">—</span></div>
            </header>

            <div class="summary-grid" id="summary-grid"></div>
        </main>
    </div>

    <div class="toast" id="archive-toast" hidden></div>

    <script>
        const DB_NAME = 'DeskUIDatabase';
        const PRIVATE_AUTH_ID = 'private_conversation_auth';
        const DOSSIER_STORAGE_KEY = 'rinno_dossier_state_v3';
        const MAX_HOME_CARDS = 24;
        const MAX_THREAD_ITEMS = 60;
        const MAX_MEMORY_ITEMS = 36;
        const ARCHIVE_CAPSULE_PREFIX = '[[RINNO_CAPSULE]]';
        const ARCHIVE_MEMORY_TEXT_LIMIT = 1600;
        const ARCHIVE_STORY_TEXT_LIMIT = 1800;
        const ARCHIVE_DIGEST_TEXT_LIMIT = 420;
        const PROMISE_RE = /(答应|约好|约定|一起|下次|记得|会去|等你|守住|别忘|陪你|等我)/i;
        const SCENE_RE = /(雨|夜|风|海|灯|路|咖啡|地铁|车站|房间|窗|街|花|雪|云|月|清晨|傍晚|晚安|定位|城市|上海|北京|东京|首尔|巴黎|伦敦)/i;

        const elements = {
            homeScreen: document.getElementById('screen-home'),
            detailScreen: document.getElementById('screen-detail'),
            homeDesc: document.getElementById('home-desc'),
            scopeOwnerLine: document.getElementById('scope-owner-line'),
            scopeOwnerNote: document.getElementById('scope-owner-note'),
            scopeSwitchTrigger: document.getElementById('scope-switch-trigger'),
            scopeSwitchCurrent: document.getElementById('scope-switch-current'),
            scopeSwitchPanel: document.getElementById('scope-switch-panel'),
            charList: document.getElementById('char-list'),
            charListCount: document.getElementById('char-list-count'),
            charListNote: document.getElementById('char-list-note'),
            searchInput: document.getElementById('archive-search-input'),
            refreshArchive: document.getElementById('refresh-archive'),
            clearSearch: document.getElementById('clear-search'),
            detailTitle: document.getElementById('detail-title'),
            detailName: document.getElementById('detail-name'),
            detailHeroAvatar: document.getElementById('detail-hero-avatar'),
            detailHeroTags: document.getElementById('detail-hero-tags'),
            detailHeroId: document.getElementById('detail-hero-id'),
            memoryList: document.getElementById('memory-list'),
            plotTimeline: document.getElementById('plot-timeline'),
            summaryAvatar: document.getElementById('summary-avatar'),
            summaryName: document.getElementById('summary-name-text'),
            summaryId: document.getElementById('summary-id-text'),
            summaryGrid: document.getElementById('summary-grid'),
            toast: document.getElementById('archive-toast'),
            tabs: Array.from(document.querySelectorAll('.sg-tab')),
            views: Array.from(document.querySelectorAll('.sg-view'))
        };

        function createArchiveAudit(overrides = {}) {
            return {
                rawContacts: 0,
                scopedContacts: 0,
                visibleContacts: 0,
                rejectedContacts: 0,
                truncatedContacts: 0,
                rawThreads: 0,
                visibleThreads: 0,
                rejectedThreads: 0,
                truncatedThreads: 0,
                ...overrides
            };
        }

        let archiveState = {
            scope: null,
            scopeOptions: [],
            contacts: [],
            allowedIds: new Set(),
            threads: new Map(),
            userMoments: [],
            audit: createArchiveAudit(),
            query: ''
        };
        let currentDetailId = '';
        let currentDetailView = 'view-memory';
        let homeScrollY = 0;
        let toastTimer = 0;
        let scopeSwitchOpen = false;

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function safeParseJson(value, fallback) {
            if (!value) return fallback;
            if (typeof value === 'object') return value;
            try {
                return JSON.parse(String(value));
            } catch (error) {
                return fallback;
            }
        }

        function isPrivateEmail(value) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value || '').trim());
        }

        function normalizeIdentityId(value) {
            const id = String(value || '').trim();
            return isPrivateEmail(id) ? id.toLowerCase() : id;
        }

        function normalizeOwnerId(value) {
            return normalizeIdentityId(value);
        }

        function normalizeDigits(value) {
            return String(value || '').replace(/[^\d]/g, '').slice(0, 10);
        }

        function normalizeContactId(value, fallback = '') {
            const raw = String(value || fallback || '').trim();
            const source = raw || `contact-${Date.now()}`;
            const stripped = source
                .replace(/^rinno-contact[-:]/i, '')
                .replace(/\s+/g, '-')
                .replace(/[^a-z0-9:_-]/gi, '-')
                .replace(/-+/g, '-')
                .replace(/^-+|-+$/g, '');
            return `rinno-contact-${stripped || `contact-${Date.now()}`}`;
        }

        function normalizeContactSubtitle(value) {
            return String(value || '').replace(/\s+/g, ' ').trim().slice(0, 80);
        }

        function normalizeText(value, maxLength = 220) {
            return String(value || '')
                .replace(/\r/g, '')
                .replace(/\s+\n/g, '\n')
                .replace(/\n\s+/g, '\n')
                .replace(/\n{3,}/g, '\n\n')
                .replace(/[ \t]{2,}/g, ' ')
                .trim()
                .slice(0, maxLength);
        }

        function normalizeArchiveText(value, maxLength = ARCHIVE_MEMORY_TEXT_LIMIT) {
            return String(value || '')
                .replace(/\r/g, '')
                .replace(/\n{3,}/g, '\n\n')
                .trim()
                .slice(0, maxLength);
        }

        function normalizeLifeStages(value) {
            const source = Array.isArray(value) ? value : [];
            return source
                .map(item => {
                    if (!item) return null;
                    const age = normalizeText(item.age || item.stage || item.period || '', 18);
                    const experience = normalizeText(item.experience || item.text || item.story || item.content || '', 240);
                    return experience ? { age: age || '阶段', experience } : null;
                })
                .filter(Boolean)
                .slice(0, 3);
        }

        function normalizeMoments(value) {
            const source = Array.isArray(value) ? value : [];
            return source
                .map((item, index) => {
                    const text = normalizeText(item?.text || '', 220);
                    if (!text) return null;
                    return {
                        id: String(item?.id || `moment-${index}`),
                        title: normalizeText(item?.title || '今日拾光', 40),
                        text,
                        mood: normalizeText(item?.mood || '', 24),
                        time: normalizeText(item?.time || '', 24)
                    };
                })
                .filter(Boolean)
                .slice(0, 16);
        }

        function normalizeImagePayload(value, fallback = {}) {
            const source = value && typeof value === 'object' ? value : fallback;
            const src = String(source.src || source.url || source.image || '').trim();
            if (!src) return null;
            return {
                src,
                name: normalizeText(source.name || '', 80)
            };
        }

        function normalizeVoicePayload(value, fallback = {}) {
            const source = value && typeof value === 'object' ? value : fallback;
            const transcript = normalizeText(source.transcript || source.content || fallback.content || '', 220);
            if (!transcript) return null;
            return {
                transcript,
                durationSeconds: Math.max(0, Number(source.durationSeconds || source.duration || 0) || 0)
            };
        }

        function normalizeLocationPayload(value, fallback = {}) {
            const source = value && typeof value === 'object' ? value : fallback;
            const name = normalizeText(source.name || fallback.content || '', 72);
            const address = normalizeText(source.address || '', 120);
            const note = normalizeText(source.note || '', 80);
            if (!name && !address && !note) return null;
            return { name, address, note };
        }

        function normalizeStickerPayload(value, fallback = {}) {
            const source = value && typeof value === 'object' ? value : fallback;
            const description = normalizeText(source.description || fallback.content || '', 120);
            if (!description) return null;
            return { description, url: String(source.url || '').trim() };
        }

        function normalizeMessageType(item) {
            const type = String(item?.type || '').trim().toLowerCase();
            if (['camera', 'image', 'voice', 'location', 'sticker', 'reply', 'text'].includes(type)) return type;
            if (item?.image?.src || item?.image?.url) return 'image';
            if (item?.voice) return 'voice';
            if (item?.location) return 'location';
            if (item?.sticker) return 'sticker';
            return 'text';
        }

        function normalizeMessages(value) {
            if (!Array.isArray(value)) return [];
            return value
                .slice(0, 240)
                .map((item, index) => {
                    if (!item || typeof item !== 'object') return null;
                    const role = item.role === 'user'
                        ? 'user'
                        : item.role === 'system'
                            ? 'system'
                            : 'assistant';
                    const type = role === 'system' ? 'text' : normalizeMessageType(item);
                    const image = (type === 'camera' || type === 'image') ? normalizeImagePayload(item.image, item.media || item) : null;
                    const voice = type === 'voice' ? normalizeVoicePayload(item.voice, item) : null;
                    const location = type === 'location' ? normalizeLocationPayload(item.location, item) : null;
                    const sticker = type === 'sticker' ? normalizeStickerPayload(item.sticker, item) : null;
                    const content = normalizeText(
                        type === 'voice'
                            ? voice?.transcript || ''
                            : type === 'location'
                                ? [location?.name, location?.address, location?.note].filter(Boolean).join(' · ')
                                : type === 'sticker'
                                    ? sticker?.description || ''
                                    : item.content || item.text || '',
                        1200
                    );
                    if (role === 'system' && content.startsWith(ARCHIVE_CAPSULE_PREFIX)) return null;
                    const recalled = Boolean(item.recalled);
                    const recalledData = recalled && item.recalledData && typeof item.recalledData === 'object'
                        ? {
                            actorName: normalizeText(item.recalledData.actorName || '', 30),
                            actorRole: item.recalledData.actorRole === 'assistant' ? 'assistant' : 'user',
                            content: normalizeText(item.recalledData.content || '', 220),
                            createdAt: Number(item.recalledData.createdAt) || 0,
                            wasCaught: Boolean(item.recalledData.wasCaught)
                        }
                        : null;
                    if (!content && !image && !voice && !location && !sticker && !(recalled && recalledData)) return null;
                    return {
                        id: String(item.id || `message-${index}`),
                        role,
                        type,
                        content,
                        image,
                        voice,
                        location,
                        sticker,
                        createdAt: Number(item.createdAt) || Date.now(),
                        translation: role === 'assistant' ? normalizeText(item.translation || item.translation_zh || item.translationZh || '', 260) : '',
                        recalled,
                        recalledData
                    };
                })
                .filter(Boolean);
        }

        function normalizeThreads(value) {
            if (!Array.isArray(value)) return [];
            return value
                .map((item, index) => {
                    if (!item || typeof item !== 'object') return null;
                    const contactId = normalizeContactId(item.contactId || item.peerId || `thread-${index}`);
                    const messages = normalizeMessages(item.messages);
                    return {
                        id: String(item.id || `contact-chat:${contactId}`),
                        contactId,
                        draft: normalizeText(item.draft || '', 800),
                        unread: Math.max(0, Number(item.unread) || 0),
                        updatedAt: Number(item.updatedAt) || messages[messages.length - 1]?.createdAt || 0,
                        messages
                    };
                })
                .filter(Boolean);
        }

        function normalizeContacts(value, scopeId) {
            const source = Array.isArray(value) ? value : [];
            const contacts = [];
            const seenIds = new Set();
            source.forEach((item, index) => {
                if (!item || typeof item !== 'object') return;
                const normalizedOwnerId = normalizeOwnerId(item.ownerId || item.owner || '');
                if (scopeId && normalizedOwnerId && normalizedOwnerId !== scopeId) return;
                const id = normalizeContactId(item.id || item.recordId || item.accountId || `contact-${index}`);
                if (seenIds.has(id)) return;
                seenIds.add(id);
                contacts.push({
                    id,
                    ownerId: normalizedOwnerId || scopeId,
                    type: String(item.type || 'contact'),
                    title: normalizeText(item.title || item.name || '未命名联系人', 32),
                    subtitle: normalizeContactSubtitle(item.subtitle || ''),
                    note: normalizeText(item.note || '', 240),
                    accountId: normalizeDigits(item.accountId || item.publicId || ''),
                    dossierType: String(item.dossierType || '').toLowerCase() === 'npc' ? 'npc' : 'char',
                    dossierRecordId: String(item.dossierRecordId || item.recordId || '').trim(),
                    avatar: String(item.avatar || '').trim(),
                    homepageCover: String(item.homepageCover || item.cover || '').trim(),
                    profession: normalizeText(item.profession || item.job || '', 24),
                    signature: normalizeText(item.signature || item.personaSignature || item.tagline || '', 32),
                    nationality: normalizeText(item.nationality || item.country || '', 32),
                    phoneNumber: normalizeText(item.phoneNumber || item.phone || '', 32),
                    ipCity: normalizeText(item.ipCity || item.ipLocation || item.city || '', 32),
                    homeAddress: normalizeText(item.homeAddress || item.address || '', 80),
                    lifeStages: normalizeLifeStages(item.lifeStages || item.ageStages || item.experiences || []),
                    summaryMemory: normalizeArchiveText(item.summaryMemory || item.memorySummary || '', ARCHIVE_MEMORY_TEXT_LIMIT),
                    summaryStory: normalizeArchiveText(item.summaryStory || item.storySummary || '', ARCHIVE_STORY_TEXT_LIMIT),
                    summaryDigest: normalizeArchiveText(item.summaryDigest || item.relationshipSummary || '', ARCHIVE_DIGEST_TEXT_LIMIT),
                    summaryUpdatedAt: Math.max(0, Number(item.summaryUpdatedAt || item.archiveUpdatedAt) || 0)
                });
            });
            return contacts;
        }

        function normalizeDossierState(value) {
            const source = value && typeof value === 'object' ? value : {};
            const list = type => (Array.isArray(source[type]) ? source[type] : []).map(item => ({
                ...item,
                type,
                id: String(item?.id || '').trim(),
                publicId: normalizeDigits(item?.publicId || ''),
                name: normalizeText(item?.name || '', 32),
                nickname: normalizeText(item?.nickname || '', 32),
                avatar: String(item?.avatar || '').trim(),
                setting: normalizeText(item?.setting || item?.note || '', 900),
                monologue: normalizeText(item?.monologue || '', 520),
                gender: normalizeText(item?.gender || '', 16),
                nationality: normalizeText(item?.nationality || '', 28),
                role: normalizeText(item?.role || '', 42),
                tags: Array.isArray(item?.tags) ? item.tags.map(tag => normalizeText(tag, 16)).filter(Boolean).slice(0, 8) : [],
                relation: normalizeText(item?.relation || '', 64),
                note: normalizeText(item?.note || '', 220),
                rinnoMemorySummary: normalizeArchiveText(item?.rinnoMemorySummary || item?.memorySummary || '', ARCHIVE_MEMORY_TEXT_LIMIT),
                rinnoStorySummary: normalizeArchiveText(item?.rinnoStorySummary || item?.storySummary || '', ARCHIVE_STORY_TEXT_LIMIT),
                rinnoSummaryDigest: normalizeArchiveText(item?.rinnoSummaryDigest || item?.relationshipSummary || '', ARCHIVE_DIGEST_TEXT_LIMIT),
                rinnoSummaryUpdatedAt: Math.max(0, Number(item?.rinnoSummaryUpdatedAt || item?.summaryUpdatedAt) || 0),
                socialFollowers: Number(item?.socialFollowers) || 0,
                socialFollowing: Number(item?.socialFollowing) || 0,
                socialOthers: Number(item?.socialOthers) || 0,
                followedBy: Array.isArray(item?.followedBy) ? item.followedBy.map(name => normalizeText(name, 18)).filter(Boolean).slice(0, 3) : []
            }));
            return {
                char: list('char'),
                npc: list('npc'),
                network: source.network && typeof source.network === 'object' ? source.network : { nodes: [], links: [] }
            };
        }

        function getActiveIdentityId(rawState) {
            const slots = rawState && typeof rawState.identities === 'object' ? rawState.identities : {};
            const normalizedKeys = Object.keys(slots).map(normalizeIdentityId).filter(Boolean);
            const candidates = [
                rawState?.lastAccountId,
                rawState?.email,
                rawState?.userPresetId
            ].map(normalizeIdentityId).filter(Boolean);
            for (const candidate of candidates) {
                if (normalizedKeys.includes(candidate)) return candidate;
            }
            return candidates[0] || normalizedKeys[0] || '';
        }

        function buildDossierIndexes(state) {
            const records = [...state.char, ...state.npc];
            const byRecord = new Map();
            const byPublicId = new Map();
            records.forEach(record => {
                if (record.id) byRecord.set(`${record.type}:${record.id}`, record);
                if (record.publicId) byPublicId.set(record.publicId, record);
            });
            return { records, byRecord, byPublicId };
        }

        function getNetworkNodeKey(node) {
            if (!node || typeof node !== 'object') return '';
            const kind = String(node.kind || '').trim().toLowerCase();
            const refId = String(node.refId || '').trim();
            if ((kind === 'char' || kind === 'npc') && refId) return `${kind}:${refId}`;
            if (kind === 'user') return 'user';
            return '';
        }

        function buildRelationIndex(network) {
            const nodes = Array.isArray(network?.nodes) ? network.nodes : [];
            const links = Array.isArray(network?.links) ? network.links : [];
            const nodeMap = new Map(nodes.map(node => [String(node?.id || '').trim(), node]));
            const relationMap = new Map();
            links.forEach(link => {
                const fromNode = nodeMap.get(String(link?.from || '').trim());
                const toNode = nodeMap.get(String(link?.to || '').trim());
                const fromKey = getNetworkNodeKey(fromNode);
                const toKey = getNetworkNodeKey(toNode);
                const relationData = {
                    label: normalizeText(link?.relation || '', 40),
                    note: normalizeText(link?.description || '', 220)
                };
                if (!relationData.label && !relationData.note) return;
                if (fromKey === 'user' && toKey && !relationMap.has(toKey)) relationMap.set(toKey, relationData);
                if (toKey === 'user' && fromKey && !relationMap.has(fromKey)) relationMap.set(fromKey, relationData);
                if (fromKey && toKey && fromKey !== 'user' && !relationMap.has(fromKey)) relationMap.set(fromKey, relationData);
                if (toKey && fromKey && toKey !== 'user' && !relationMap.has(toKey)) relationMap.set(toKey, relationData);
            });
            return relationMap;
        }

        function buildArchiveScopeOptions(privateState, activeId, fallbackScopeId = '') {
            const slots = privateState && typeof privateState.identities === 'object' ? privateState.identities : {};
            const options = Object.entries(slots)
                .map(([rawId, slot]) => {
                    const id = normalizeIdentityId(rawId);
                    if (!id) return null;
                    return {
                        id,
                        displayName: normalizeText(slot?.nickname || slot?.userPresetName || slot?.name || '未命名用户', 32),
                        avatar: String(slot?.avatar || '').trim(),
                        active: id === activeId
                    };
                })
                .filter(Boolean)
                .sort((left, right) => {
                    if (left.active !== right.active) return left.active ? -1 : 1;
                    return String(left.displayName || '').localeCompare(String(right.displayName || ''), 'zh-CN');
                });
            if (!options.length && fallbackScopeId) {
                options.push({
                    id: fallbackScopeId,
                    displayName: normalizeText(privateState?.nickname || privateState?.userPresetName || '当前用户', 32),
                    avatar: String(privateState?.avatar || '').trim(),
                    active: true
                });
            }
            return options;
        }

        function findDossierRecord(contact, indexes) {
            if (contact.dossierRecordId) {
                const record = indexes.byRecord.get(`${contact.dossierType}:${contact.dossierRecordId}`);
                if (record) return record;
            }
            if (contact.accountId) {
                const record = indexes.byPublicId.get(contact.accountId);
                if (record) return record;
            }
            return null;
        }

        function createFallbackSignature(record = null, contact = null) {
            const source = `${record?.setting || ''} ${record?.monologue || ''} ${contact?.note || ''}`.toLowerCase();
            if (/(温柔|细腻|照顾|安静|慢)/i.test(source)) return '慢一点靠近，也会认真回应';
            if (/(冷|克制|疏离|沉默|隐忍)/i.test(source)) return '不轻易靠近，也不轻易忘记';
            if (/(艺术|音乐|摄影|诗|画|浪漫)/i.test(source)) return '把情绪藏进光影与留白里';
            return '把距离放轻，把真心放深';
        }

        function formatAbsoluteDate(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '';
            const month = date.toLocaleString('en-US', { month: 'short' }).toUpperCase();
            return `${date.getDate().toString().padStart(2, '0')} ${month} ${date.getFullYear()}`;
        }

        function formatMonthDay(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return { major: '—', minor: 'DATE' };
            return {
                major: String(date.getDate()).padStart(2, '0'),
                minor: date.toLocaleString('en-US', { month: 'short' }).toUpperCase()
            };
        }

        function formatTimeAgo(value) {
            const timestamp = Number(value) || 0;
            if (!timestamp) return '未建立时间线';
            const diff = Date.now() - timestamp;
            const day = 24 * 60 * 60 * 1000;
            if (diff < 60 * 1000) return '刚刚';
            if (diff < 60 * 60 * 1000) return `${Math.max(1, Math.floor(diff / (60 * 1000)))} 分钟前`;
            if (diff < day) return `${Math.max(1, Math.floor(diff / (60 * 60 * 1000)))} 小时前`;
            if (diff < day * 7) return `${Math.max(1, Math.floor(diff / day))} 天前`;
            return formatAbsoluteDate(timestamp);
        }

        function formatCount(value) {
            return Number(value || 0).toLocaleString('en-US');
        }

        function enrichContact(contact, thread, record, relation, scopeId) {
            const messages = Array.isArray(thread?.messages) ? thread.messages : [];
            const firstMessage = messages[0] || null;
            const lastMessage = messages[messages.length - 1] || null;
            const title = contact.title || record?.nickname || record?.name || '未命名联系人';
            const subtitle = relation?.label
                || contact.subtitle
                || record?.role
                || (contact.accountId ? `ID ${contact.accountId}` : '关系待补全');
            const signature = contact.signature || record?.relation || createFallbackSignature(record, contact);
            const note = contact.note || record?.setting || record?.monologue || '还没有留下更多上下文。';
            const nationality = contact.nationality || record?.nationality || '';
            const tags = [
                ...(Array.isArray(record?.tags) ? record.tags : []),
                contact.profession || '',
                nationality,
                relation?.label || '',
                signature
            ].map(tag => normalizeText(tag, 18)).filter(Boolean);
            const uniqueTags = [...new Set(tags)].slice(0, 5);
            const activeDays = new Set(messages.map(message => {
                const date = new Date(message.createdAt);
                return Number.isNaN(date.getTime()) ? '' : date.toISOString().slice(0, 10);
            }).filter(Boolean)).size;
            const richCount = messages.filter(message => ['camera', 'image', 'voice', 'location', 'sticker'].includes(message.type)).length;
            let status = 'EMPTY';
            if (messages.length >= 12) status = 'RECORDED';
            else if (messages.length >= 4 || record) status = 'SYNCED';
            return {
                ...contact,
                ownerId: scopeId,
                title,
                subtitle,
                note,
                signature,
                nationality,
                avatar: contact.avatar || record?.avatar || '',
                accountId: contact.accountId || record?.publicId || '',
                record,
                relation,
                tags: uniqueTags,
                messageCount: messages.length,
                activeDays,
                richCount,
                firstActiveAt: firstMessage?.createdAt || 0,
                lastActiveAt: lastMessage?.createdAt || 0,
                firstMessage,
                lastMessage,
                status,
                socialFollowers: Number(record?.socialFollowers) || 0,
                socialFollowing: Number(record?.socialFollowing) || 0,
                socialOthers: Number(record?.socialOthers) || 0,
                followedBy: Array.isArray(record?.followedBy) ? record.followedBy : [],
                lifeStages: contact.lifeStages.length ? contact.lifeStages : normalizeLifeStages(record?.lifeStages || []),
                summaryMemory: normalizeArchiveText(contact.summaryMemory || record?.rinnoMemorySummary || '', ARCHIVE_MEMORY_TEXT_LIMIT),
                summaryStory: normalizeArchiveText(contact.summaryStory || record?.rinnoStorySummary || '', ARCHIVE_STORY_TEXT_LIMIT),
                summaryDigest: normalizeArchiveText(contact.summaryDigest || record?.rinnoSummaryDigest || '', ARCHIVE_DIGEST_TEXT_LIMIT),
                summaryUpdatedAt: Math.max(0, Number(contact.summaryUpdatedAt || record?.rinnoSummaryUpdatedAt) || 0)
            };
        }

        function buildArchiveScope(privateState, dossierState) {
            const normalizedDossier = normalizeDossierState(dossierState);
            const activeId = getActiveIdentityId(privateState);
            const slots = privateState && typeof privateState.identities === 'object' ? privateState.identities : {};
            const slot = activeId && slots[activeId] && typeof slots[activeId] === 'object' ? slots[activeId] : null;
            const scopeId = activeId || normalizeIdentityId(privateState?.email || privateState?.userPresetId || 'local');
            const scopeOptions = buildArchiveScopeOptions(privateState, activeId, scopeId);
            const rawContacts = slot?.contacts || privateState?.contacts || [];
            const rawThreads = slot?.threads || privateState?.threads || [];
            const scopedContacts = normalizeContacts(rawContacts, scopeId);
            const contacts = scopedContacts.slice(0, MAX_HOME_CARDS);
            const allowedIds = new Set(contacts.map(contact => contact.id));
            const normalizedThreads = normalizeThreads(rawThreads);
            const inScopeThreads = normalizedThreads.filter(thread => allowedIds.has(thread.contactId));
            const visibleThreads = inScopeThreads.slice(0, MAX_THREAD_ITEMS);
            const threadMap = new Map(visibleThreads.map(thread => [thread.contactId, thread]));
            const dossierIndexes = buildDossierIndexes(normalizedDossier);
            const relationIndex = buildRelationIndex(normalizedDossier.network);
            const enrichedContacts = contacts
                .map(contact => {
                    const record = findDossierRecord(contact, dossierIndexes);
                    const relationKey = contact.dossierRecordId ? `${contact.dossierType}:${contact.dossierRecordId}` : '';
                    const relation = relationKey ? relationIndex.get(relationKey) || null : null;
                    return enrichContact(contact, threadMap.get(contact.id), record, relation, scopeId);
                })
                .sort((left, right) => {
                    if ((right.lastActiveAt || 0) !== (left.lastActiveAt || 0)) return (right.lastActiveAt || 0) - (left.lastActiveAt || 0);
                    return String(left.title || '').localeCompare(String(right.title || ''), 'zh-CN');
                });
            const finalAllowedIds = new Set(enrichedContacts.map(contact => contact.id));
            return {
                scope: {
                    id: scopeId,
                    displayName: normalizeText(slot?.nickname || slot?.userPresetName || privateState?.nickname || privateState?.userPresetName || '我', 32),
                    avatar: String(slot?.avatar || privateState?.avatar || '').trim(),
                    bio: normalizeText(slot?.profileBio || privateState?.profileBio || '', 120)
                },
                scopeOptions,
                contacts: enrichedContacts,
                allowedIds: finalAllowedIds,
                threads: new Map(visibleThreads
                    .filter(thread => finalAllowedIds.has(thread.contactId))
                    .map(thread => [thread.contactId, thread])),
                userMoments: normalizeMoments(slot?.moments || privateState?.moments || []),
                audit: createArchiveAudit({
                    rawContacts: Array.isArray(rawContacts) ? rawContacts.length : 0,
                    scopedContacts: scopedContacts.length,
                    visibleContacts: contacts.length,
                    rejectedContacts: Math.max(0, (Array.isArray(rawContacts) ? rawContacts.length : 0) - scopedContacts.length),
                    truncatedContacts: Math.max(0, scopedContacts.length - contacts.length),
                    rawThreads: normalizedThreads.length,
                    visibleThreads: visibleThreads.length,
                    rejectedThreads: Math.max(0, normalizedThreads.length - inScopeThreads.length),
                    truncatedThreads: Math.max(0, inScopeThreads.length - visibleThreads.length)
                }),
                dossier: normalizedDossier
            };
        }

        function getSharedDb() {
            try {
                if (window.parent && window.parent !== window && window.parent.db?.edits) return window.parent.db;
            } catch (error) {
                return null;
            }
            return null;
        }

        function createLocalDb() {
            if (typeof window.Dexie !== 'function') throw new Error('Dexie 未加载，无法读取本机档案。');
            const db = new window.Dexie(DB_NAME);
            db.version(1).stores({
                edits: 'id',
                layout: 'cid'
            });
            return db;

        async function readArchiveRecords() {
            const sharedDb = getSharedDb();
            const db = sharedDb || createLocalDb();
            const [privateRecord, dossierRecord] = await Promise.all([
                db.edits.get(PRIVATE_AUTH_ID),
                db.edits.get(DOSSIER_STORAGE_KEY)
            ]);
            const privateState = safeParseJson(privateRecord?.content || privateRecord || {}, {});
            const dossierState = safeParseJson(dossierRecord?.content || dossierRecord || {}, {});
            return buildArchiveScope(privateState, dossierState);
        }

        function setAvatarSurface(element, avatar, fallback) {
            const seed = createAvatarSeed(element?.dataset?.avatarSeed || fallback || '');
            const safeAvatar = String(avatar || '').trim();
            element.style.setProperty('--archive-avatar-gradient', seed);
            element.classList.toggle('has-image', Boolean(safeAvatar));
            if (safeAvatar) {
                element.style.setProperty('--archive-avatar-image', `url("${safeAvatar.replace(/"/g, '&quot;')}")`);
            } else {
                element.style.removeProperty('--archive-avatar-image');
            }
            const holder = element.querySelector('span');
            if (holder) holder.textContent = '';
        }

        function createAvatarSeed(value) {
            const source = String(value || 'rinno').trim() || 'rinno';
            let hash = 0;
            for (let index = 0; index < source.length; index += 1) {
                hash = ((hash * 33) + source.charCodeAt(index)) >>> 0;
            }
            const angle = 118 + (hash % 72);
            const glowX = 18 + (hash % 24);
            const glowY = 16 + ((hash >> 3) % 24);
            const shadowX = 82 - ((hash >> 5) % 24);
            const shadowY = 80 - ((hash >> 7) % 24);
            const accentMix = 14 + (hash % 14);
            const strongMix = 10 + ((hash >> 2) % 10);
            return [
                `radial-gradient(circle at ${glowX}% ${glowY}%, color-mix(in srgb, var(--paper-surface) 88%, white 12%), transparent 34%)`,
                `radial-gradient(circle at ${shadowX}% ${shadowY}%, color-mix(in srgb, var(--accent) ${accentMix}%, transparent), transparent 38%)`,
                `linear-gradient(${angle}deg, color-mix(in srgb, var(--paper-surface-alt) 78%, var(--paper-surface) 22%), color-mix(in srgb, var(--accent-strong) ${strongMix}%, var(--paper-surface-alt)))`
            ].join(', ');
        }

        function getAvatarSeedValue(contact) {
            if (!contact || typeof contact !== 'object') return 'rinno';
            return [
                contact.id,
                contact.accountId,
                contact.title,
                contact.nationality,
                contact.signature
            ].filter(Boolean).join('|') || 'rinno';
        }

        function getContactInitial(contact) {

        }

        function getHomeListName(contact) {

        }

        function getHomeSignature(contact) {
            return String(
                contact?.signature
                || contact?.record?.monologue
                || contact?.note
                || contact?.subtitle
                || '这位联系人还没有留下个性签名。'

        }

        function closeScopeSwitchPanel() {
            scopeSwitchOpen = false;
            if (elements.scopeSwitchPanel) elements.scopeSwitchPanel.hidden = true;
            if (elements.scopeSwitchTrigger) elements.scopeSwitchTrigger.setAttribute('aria-expanded', 'false');
        }

        function renderScopeSwitchPanel() {
            if (!elements.scopeSwitchPanel || !elements.scopeSwitchCurrent || !elements.scopeSwitchTrigger) return;
            const scope = archiveState.scope;
            elements.scopeSwitchCurrent.textContent = scope?.id || '未登录';
            const options = Array.isArray(archiveState.scopeOptions) ? archiveState.scopeOptions : [];
            elements.scopeSwitchTrigger.disabled = options.length <= 1;
            elements.scopeSwitchPanel.innerHTML = options.length
                ? options.map(option => `
                    <button class="scope-option${option.active ? ' is-active' : ''}" type="button" data-scope-option="${escapeHtml(option.id)}">
                        <span class="scope-option-name">${escapeHtml(option.displayName || '当前用户')}</span>
                        <strong class="scope-option-id">${escapeHtml(option.id)}</strong>
                    </button>
                `).join('')
                : `<div class="scope-option-empty">当前没有可切换的 user 账号</div>`;
            elements.scopeSwitchPanel.hidden = !scopeSwitchOpen;
            elements.scopeSwitchTrigger.setAttribute('aria-expanded', scopeSwitchOpen ? 'true' : 'false');
        }

        async function writeActiveArchiveScope(scopeId) {
            const nextScopeId = normalizeIdentityId(scopeId);
            if (!nextScopeId) return;
            const sharedDb = getSharedDb();
            const db = sharedDb || createLocalDb();
            const privateRecord = await db.edits.get(PRIVATE_AUTH_ID);
            const privateState = safeParseJson(privateRecord?.content || privateRecord || {}, {});
            privateState.lastAccountId = nextScopeId;
            const nextRecord = privateRecord && typeof privateRecord === 'object' && privateRecord.id
                ? { ...privateRecord, content: JSON.stringify(privateState) }
                : { id: PRIVATE_AUTH_ID, content: JSON.stringify(privateState) };
            await db.edits.put(nextRecord);
        }

        async function switchArchiveScope(scopeId) {
            const nextScopeId = normalizeIdentityId(scopeId);
            if (!nextScopeId || nextScopeId === archiveState.scope?.id) {
                closeScopeSwitchPanel();
                return;
            }
            try {
                await writeActiveArchiveScope(nextScopeId);
                closeScopeSwitchPanel();
                await refreshArchive({ silent: true });
            } catch (error) {
                console.warn('Archive scope switch failed:', error);
                showToast('切换 user 账号失败，请稍后再试。', 2600);
            }
        }

        function createEmptyStateMarkup(title, text) {
            return `
                <section class="empty-state">
                    <strong>${escapeHtml(title)}</strong>
                    <p>${escapeHtml(text)}</p>
                </section>
            `;

        function showToast(text, duration = 2200) {
            const message = String(text || '').trim();

            elements.toast.textContent = message;
            elements.toast.hidden = false;
            window.clearTimeout(toastTimer);
            toastTimer = window.setTimeout(() => {
                elements.toast.hidden = true;
            }, duration);

        function renderScopeCard() {
            const scope = archiveState.scope;
            const audit = archiveState.audit || createArchiveAudit();
            if (!scope) {
                elements.scopeOwnerLine.textContent = '未发现可用作用域';
                elements.scopeOwnerNote.textContent = '请先在私叙中创建或登录账号，再回到拾光读取当前 ID 档案。';
                if (elements.homeDesc) elements.homeDesc.textContent = '先在私叙里登录一个 user 账号，再回来查看拾光档案。';
                renderScopeSwitchPanel();
                return;
            }
            elements.scopeOwnerLine.textContent = `${scope.displayName} · ${scope.id || '未设定 ID'}`;
            const contactCount = archiveState.contacts.length;
            const auditNotes = [];
            if (audit.rejectedContacts) auditNotes.push(`拦截 ${audit.rejectedContacts} 条非本 ID 联系人`);
            if (audit.truncatedContacts) auditNotes.push(`折叠 ${audit.truncatedContacts} 条超出上限的联系人`);
            if (audit.rejectedThreads) auditNotes.push(`丢弃 ${audit.rejectedThreads} 条越界线程`);
            if (audit.truncatedThreads) auditNotes.push(`折叠 ${audit.truncatedThreads} 条超出上限的线程`);
            const auditText = auditNotes.length
                ? ` 已执行隔离：${auditNotes.join('，')}。`
                : ' 当前未发现跨 ID 记录。';
            elements.scopeOwnerNote.textContent = contactCount
                ? `当前作用域收录 ${contactCount} 位联系人，只允许读取 ownerId = ${scope.id} 的本地数据。${auditText}`
                : `当前作用域为 ${scope.id}，但还没有联系人档案。${auditText}`;
            if (elements.homeDesc) {
                elements.homeDesc.textContent = `${scope.displayName || '当前用户'} · ${scope.id || '未设定 ID'}。只读取这个 user 作用域里的联系人档案。`;
            }
            renderScopeSwitchPanel();
        }

        function getFilteredContacts() {
            const query = String(archiveState.query || '').trim().toLowerCase();
            if (!query) return archiveState.contacts;
            return archiveState.contacts.filter(contact => {
                const source = [
                    contact.title,
                    contact.record?.name,
                    contact.record?.nickname,
                    contact.subtitle,
                    contact.note,
                    contact.accountId,
                    contact.id,
                    contact.signature
                ].join(' ').toLowerCase();
                return source.includes(query);
            });
        }

        function createStatusClass(status) {
            if (status === 'RECORDED') return 'is-rich';
            if (status === 'EMPTY') return 'is-empty';
            return '';
        }

        function getContactRoleName(contact) {
            const roleName = String(contact?.record?.name || '').trim();
            const title = String(contact?.title || '').trim();
            if (!roleName || roleName === title) return '';
            return roleName;
        }

        function getHomeSubtitle(contact) {
            const title = String(contact?.title || '').trim();
            const candidates = [
                getContactRoleName(contact),
                contact?.relation?.label,
                contact?.record?.role,
                contact?.profession,
                contact?.nationality ? `国籍 · ${contact.nationality}` : '',
                contact?.signature
            ].map(value => String(value || '').trim()).filter(Boolean);
            return candidates.find(value => value !== title && !/^ID\s+/i.test(value)) || '关系待补全';
        }

        function getHomeBodyCopy(contact) {

                contact?.record?.setting
                || contact?.note
                || contact?.record?.monologue
                || contact?.signature
                || '这份档案还没有更多设定。'

        function syncHomeAvatarSurfaces(contacts) {
