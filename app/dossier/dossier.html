<section class="dossier-app" id="dossier-app" aria-label="卷宗">
    <div class="dossier-shell">
        <header class="dossier-top">
            <div class="dossier-heading">
                <div class="dossier-kicker">RINNO CASEBOOK</div>
                <button class="dossier-title interactive" id="dossier-close-title" type="button" aria-label="返回主屏">卷宗</button>
                <div class="dossier-issue" id="dossier-issue">CHAR / NPC / RELATION</div>
            </div>
            <button class="dossier-add-button interactive" id="dossier-add-current" type="button" aria-label="新增资料" title="新增资料">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </header>

        <nav class="dossier-tabs" aria-label="卷宗页面">
            <button class="dossier-tab interactive active" type="button" data-dossier-tab="char" aria-pressed="true">
                <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M5 21a7 7 0 0 1 14 0"/></svg>
                <span>Char</span>
            </button>
            <button class="dossier-tab interactive" type="button" data-dossier-tab="npc" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 8h10M7 12h7"/><path d="M5 4h14v14H8l-3 3V4z"/></svg>
                <span>NPC</span>
            </button>
            <button class="dossier-tab interactive" type="button" data-dossier-tab="network" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="12" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><path d="M8.7 10.7l6.6-3.4M8.7 13.3l6.6 3.4"/></svg>
                <span>关系网</span>
            </button>
        </nav>

        <main class="dossier-stage">
            <section class="dossier-view active" data-dossier-view="char" aria-label="Char">
                <section class="dossier-list-pane">
                    <div class="dossier-toolbar">
                        <label class="dossier-search" aria-label="搜索 Char">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4.5-4.5"/></svg>
                            <input id="dossier-char-search" name="dossier_char_search" type="search" placeholder="搜索姓名 / 性别 / 国籍 / 设定" autocomplete="off">
                        </label>
                    </div>
                    <div class="dossier-list" id="dossier-char-list"></div>
                </section>
                <section class="dossier-detail-pane" id="dossier-char-detail" aria-label="Char 详情"></section>
            </section>

            <section class="dossier-view" data-dossier-view="npc" aria-label="NPC" hidden>
                <section class="dossier-list-pane">
                    <div class="dossier-toolbar">
                        <label class="dossier-search" aria-label="搜索 NPC">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4.5-4.5"/></svg>
                            <input id="dossier-npc-search" name="dossier_npc_search" type="search" placeholder="搜索 NPC / 性别 / 国籍 / 设定" autocomplete="off">
                        </label>
                    </div>
                    <div class="dossier-list" id="dossier-npc-list"></div>
                </section>
                <section class="dossier-detail-pane" id="dossier-npc-detail" aria-label="NPC 详情"></section>
            </section>

            <section class="dossier-view dossier-network-view" data-dossier-view="network" aria-label="关系网" hidden>
                <div class="dossier-network-tools" aria-label="关系网工具">
                    <button class="dossier-network-tool interactive" type="button" data-dossier-network-add="char" aria-label="添加人物" title="添加人物">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="8" r="4"/><path d="M2 21a7 7 0 0 1 14 0"/><path d="M19 8v6M16 11h6"/></svg>
                        <span>添加人物</span>
                    </button>
                    <button class="dossier-network-tool interactive" type="button" data-dossier-network-add="text-npc" aria-label="添加文字 NPC" title="添加文字 NPC">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v14H8l-3 3V4z"/><path d="M8 9h8M8 13h5"/></svg>
                        <span>文字NPC</span>
                    </button>
                </div>

                <div class="dossier-network-board" id="dossier-network-board" aria-label="人物关系图">
                    <div class="dossier-network-viewport" id="dossier-network-viewport">
                        <div class="dossier-network-canvas" id="dossier-network-canvas">
                            <div class="dossier-network-canvas-inner" id="dossier-network-canvas-inner">
                                <svg class="dossier-network-links" id="dossier-network-links" aria-hidden="true"></svg>
                                <div class="dossier-network-nodes" id="dossier-network-nodes"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="dossier-relation-notes" id="dossier-relation-notes" aria-live="polite"></div>
            </section>
        </main>
    </div>

    <div class="dossier-modal" id="dossier-editor-modal" role="dialog" aria-modal="true" aria-labelledby="dossier-editor-title" hidden>
        <form class="dossier-editor" id="dossier-editor-form" autocomplete="off" novalidate>
            <div class="dossier-editor-head">
                <div>
                    <div class="dossier-editor-kicker" id="dossier-editor-kicker">CHAR</div>
                    <h2 id="dossier-editor-title">新增CHAR</h2>
                    <p class="dossier-editor-subline" id="dossier-editor-subline">NEW CHAR</p>
                </div>
            </div>
            <input id="dossier-editor-type" name="dossier_editor_type" type="hidden">
            <input id="dossier-editor-id" name="dossier_editor_id" type="hidden">
            <input id="dossier-editor-nickname" name="dossier_editor_nickname" type="hidden">
            <input id="dossier-editor-public-id" name="dossier_editor_public_id" type="hidden">
            <input id="dossier-editor-monologue" name="dossier_editor_monologue" type="hidden">
            <div class="dossier-editor-flow">
                <input id="dossier-editor-avatar" name="dossier_editor_avatar" type="hidden">
                <input id="dossier-editor-avatar-file" name="dossier_editor_avatar_file" type="file" accept="image/*" hidden>
                <div class="dossier-avatar-field">
                    <button class="dossier-avatar-picker interactive" id="dossier-editor-avatar-button" type="button" aria-label="上传头像">
                        <span class="dossier-avatar-preview" id="dossier-editor-avatar-preview" aria-hidden="true"></span>
                        <span class="dossier-avatar-copy">
                            <span>昵称</span>
                            <strong id="dossier-editor-avatar-label">ID</strong>
                        </span>
                    </button>
                    <button class="dossier-avatar-clear interactive" id="dossier-editor-avatar-clear" type="button" aria-label="复制账号" hidden>复制</button>
                </div>
                <label class="dossier-field">
                    <span>姓名</span>
                    <input id="dossier-editor-name" name="dossier_editor_name" type="text" maxlength="28" required>
                </label>
                <label class="dossier-field">
                    <span>性别</span>
                    <input id="dossier-editor-gender" name="dossier_editor_gender" type="text" maxlength="16" placeholder="女 / 男 / 未知">
                </label>
                <label class="dossier-field">
                    <span>国籍</span>
                    <input id="dossier-editor-nationality" name="dossier_editor_nationality" type="text" maxlength="28" placeholder="China">
                </label>
                <label class="dossier-field dossier-field-setting">
                    <span>设定内容</span>
                    <textarea id="dossier-editor-setting" name="dossier_editor_setting" rows="7"></textarea>
                </label>
            </div>
            <div class="dossier-editor-actions">
                <button class="dossier-soft-button danger interactive" id="dossier-delete-entry" type="button">删除</button>
                <button class="dossier-soft-button primary interactive" id="dossier-editor-submit" type="submit">生成昵称·ID·独白并保存</button>
            </div>
        </form>
    </div>

    <div class="dossier-profile-modal" id="dossier-profile-modal" role="dialog" aria-modal="true" aria-label="资料卡" hidden>
        <div class="dossier-profile-dialog" id="dossier-profile-content"></div>
    </div>

    <div class="dossier-network-modal" id="dossier-network-modal" role="dialog" aria-modal="true" aria-labelledby="dossier-network-modal-title" hidden>
        <form class="dossier-network-dialog" id="dossier-network-form" autocomplete="off">
            <div class="dossier-network-modal-head">
                <div>
                    <div class="dossier-editor-kicker" id="dossier-network-modal-kicker">RELATION NODE</div>
                    <h2 id="dossier-network-modal-title">添加关系节点</h2>
                </div>
            </div>
            <input id="dossier-network-node-id" type="hidden">
            <input id="dossier-network-link-id" type="hidden">
            <div class="dossier-network-user-card" id="dossier-network-preview" aria-live="polite">
                <div class="dossier-network-preview-face" id="dossier-network-preview-face" aria-hidden="true"></div>
                <div class="dossier-network-preview-copy">
                    <span id="dossier-network-preview-kicker">SOURCE / TARGET</span>
                    <strong id="dossier-network-preview-title">选择关系对象</strong>
                    <small id="dossier-network-preview-meta">USER、Char、NPC 或文字 NPC</small>
                    <p id="dossier-network-preview-note">关系会按双方 ID 独立保存。</p>
                </div>
            </div>
            <div class="dossier-network-form-grid">
                <label class="dossier-network-preset-field">
                    <span>关系主体</span>
                    <select id="dossier-network-source"></select>
                </label>
                <div class="dossier-network-preset-field dossier-network-kind-field">
                    <span>关联对象类型</span>
                    <div class="dossier-network-kind-row" role="group" aria-label="关联对象类型">
                        <button class="dossier-network-kind interactive active" type="button" data-dossier-network-kind="char" aria-pressed="true">Char</button>
                        <button class="dossier-network-kind interactive" type="button" data-dossier-network-kind="npc" aria-pressed="false">NPC</button>
                        <button class="dossier-network-kind interactive" type="button" data-dossier-network-kind="user" aria-pressed="false">USER</button>
                        <button class="dossier-network-kind interactive" type="button" data-dossier-network-kind="text-npc" aria-pressed="false">文字NPC</button>
                    </div>
                </div>
                <label class="dossier-network-preset-field" id="dossier-network-record-field">
                    <span id="dossier-network-record-label">关联对象</span>
                    <select id="dossier-network-record"></select>
                </label>
                <label class="dossier-network-preset-field" id="dossier-network-text-name-field" hidden>
                    <span>纯 NPC 名称</span>
                    <input id="dossier-network-text-name" type="text" maxlength="28" placeholder="只在关系网里显示">
                </label>
                <label class="dossier-network-preset-field dossier-network-wide-field" id="dossier-network-text-setting-field" hidden>
                    <span>纯 NPC 设定</span>
                    <textarea id="dossier-network-text-setting" rows="3" placeholder="简短写下身份、立场或线索"></textarea>
                </label>
                <label class="dossier-network-preset-field">
                    <span>关系</span>
                    <input id="dossier-network-relation" type="text" maxlength="64" placeholder="例如：同盟 / 监护 / 旧识" required>
                </label>
                <label class="dossier-network-preset-field dossier-network-wide-field">
                    <span>关系描述</span>
                    <textarea id="dossier-network-description" rows="3" maxlength="260" placeholder="写清这段关系如何影响剧情或互动" required></textarea>
                </label>
            </div>
            <div class="dossier-network-form-actions">
                <button class="dossier-soft-button danger interactive" id="dossier-network-delete" type="button" hidden>删除节点</button>
                <button class="dossier-soft-button primary interactive" type="submit">保存关系</button>
            </div>
        </form>
    </div>

    <div class="dossier-network-subject-modal" id="dossier-network-subject-modal" role="dialog" aria-modal="true" aria-labelledby="dossier-network-subject-title" hidden>
        <div class="dossier-network-subject-dialog">
            <div class="dossier-network-modal-head">
                <div>
                    <div class="dossier-editor-kicker">RELATION OWNER</div>
                    <h2 id="dossier-network-subject-title">切换关系网对象</h2>
                </div>
            </div>
            <div class="dossier-network-subject-list" id="dossier-network-subject-list"></div>
        </div>
    </div>

    <div class="dossier-toast" id="dossier-toast" role="status" aria-live="polite" hidden></div>
</section>
